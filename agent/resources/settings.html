<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com 'self'">
  <title>StreamDeck Pi — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      font-size: 13px;
      background: #16181d;
      color: #e8eaed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Titlebar ── */
    .titlebar {
      height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      background: #1b1e24;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }

    .traffic-lights {
      display: flex;
      gap: 7px;
      -webkit-app-region: no-drag;
    }

    .traffic-dot { width: 11px; height: 11px; border-radius: 50%; }
    .traffic-dot.red    { background: #ec6a5e; }
    .traffic-dot.yellow { background: #f4bf4f; }
    .traffic-dot.green  { background: #61c554; }

    .titlebar-title {
      margin-left: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #aeb4bf;
    }

    /* ── Body ── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Card ── */
    .card {
      background: #1b1e24;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 16px;
    }

    .card-title {
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #7f8794;
      font-weight: 600;
      margin-bottom: 12px;
    }

    /* ── Status ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected    { background: #61c554; box-shadow: 0 0 8px #61c554; }
    .status-dot.disconnected { background: #ec6a5e; }
    .status-dot.connecting   { background: #f4bf4f; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .status-label { font-size: 13px; color: #e8eaed; }

    /* ── Devices ── */
    .device-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 4px;
    }

    .device-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #0f1116;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
    }

    .device-name { font-size: 13px; font-weight: 500; }
    .device-addr { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #7f8794; margin-top: 2px; }

    .btn-use {
      padding: 5px 12px;
      background: rgba(226,100,15,0.18);
      border: 1px solid rgba(226,100,15,0.4);
      border-radius: 6px;
      color: #e2640f;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-use:hover { background: rgba(226,100,15,0.28); }

    .no-devices {
      font-size: 12px;
      color: #7f8794;
      font-style: italic;
    }

    /* ── Form ── */
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #7f8794;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .field-hint {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
    }

    .insp-input {
      width: 100%;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0f1116;
      color: #e8eaed;
      font-size: 13px;
      font-family: 'IBM Plex Sans', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }

    .insp-input:focus { border-color: #e2640f; }

    .insp-input.mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    .token-row {
      display: flex;
      gap: 8px;
    }

    .token-row .insp-input { flex: 1; }

    .btn-sm {
      padding: 0 14px;
      background: #252830;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #9aa1ad;
      font-size: 12px;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-sm:hover {
      border-color: rgba(226,100,15,0.5);
      color: #e2640f;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .checkbox-row input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: #e2640f;
      cursor: pointer;
    }

    .checkbox-row label {
      font-size: 13px;
      color: #9aa1ad;
      cursor: pointer;
      user-select: none;
    }

    /* ── Save button ── */
    .btn-primary {
      width: 100%;
      padding: 11px;
      background: #e2640f;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { opacity: 0.75; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
  </style>
</head>
<body>

<div class="titlebar">
  <div class="traffic-lights">
    <div class="traffic-dot red"></div>
    <div class="traffic-dot yellow"></div>
    <div class="traffic-dot green"></div>
  </div>
  <span class="titlebar-title">StreamDeck Pi — Agent Settings</span>
</div>

<div class="body">

  <!-- Connection status -->
  <div class="card">
    <div class="card-title">Status</div>
    <div class="status-row">
      <div class="status-dot disconnected" id="statusDot"></div>
      <span class="status-label" id="statusText">Checking…</span>
    </div>
  </div>

  <!-- Discovered devices -->
  <div class="card">
    <div class="card-title">Discovered Devices</div>
    <div class="checkbox-row">
      <input type="checkbox" id="autoDiscover" checked>
      <label for="autoDiscover">Auto-connect to discovered Pi</label>
    </div>
    <div class="device-list" id="discoveredList">
      <div class="no-devices">Searching for devices…</div>
    </div>
  </div>

  <!-- Manual connection -->
  <div class="card">
    <div class="card-title">Manual Connection</div>

    <div class="field">
      <div class="field-label">Pi IP / Hostname</div>
      <input class="insp-input" id="host" type="text" placeholder="192.168.1.100 or streamdeckpi.local">
      <div class="field-hint">Leave blank to use auto-discovery only</div>
    </div>

    <div class="field">
      <div class="field-label">Port</div>
      <input class="insp-input mono" id="port" type="number" value="7001" style="width:120px">
    </div>

    <div class="field">
      <div class="field-label">Security Token</div>
      <div class="token-row">
        <input class="insp-input mono" id="token" type="password" placeholder="Paste token from Pi settings">
        <button class="btn-sm" id="toggleTokenBtn">Show</button>
      </div>
      <div class="field-hint">Find this on the Pi: Settings → Connection → Security Token</div>
    </div>

    <button class="btn-primary" id="connectBtn">Connect</button>
  </div>

</div>

<script>
  let settings = {};
  let tokenVisible = false;

  async function init() {
    settings = await window.electronAPI.getSettings();

    document.getElementById('host').value  = settings.host  || '';
    document.getElementById('port').value  = settings.port  || 7001;
    document.getElementById('token').value = settings.token || '';
    document.getElementById('autoDiscover').checked = settings.autoDiscover !== false;

    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    if (settings.connected) {
      dot.className = 'status-dot connected';
      text.textContent = `Connected to ${settings.host || 'Pi'}`;
    } else {
      dot.className = 'status-dot disconnected';
      text.textContent = 'Not connected';
    }

    renderDiscovered(settings.discovered || []);
  }

  function renderDiscovered(devices) {
    const el = document.getElementById('discoveredList');
    if (!devices.length) {
      el.innerHTML = '<div class="no-devices">No devices found yet…</div>';
      return;
    }
    el.innerHTML = '';
    devices.forEach(d => {
      const item = document.createElement('div');
      item.className = 'device-item';
      item.innerHTML = `
        <div>
          <div class="device-name">${d.name}</div>
          <div class="device-addr">${d.host}:${d.port}</div>
        </div>
        <button class="btn-use">Use</button>`;
      item.querySelector('button').addEventListener('click', () => useDevice(d.host, d.port));
      el.appendChild(item);
    });
  }

  function useDevice(host, port) {
    document.getElementById('host').value = host;
    document.getElementById('port').value = port;
  }

  document.getElementById('toggleTokenBtn').addEventListener('click', () => {
    tokenVisible = !tokenVisible;
    document.getElementById('token').type = tokenVisible ? 'text' : 'password';
    document.getElementById('toggleTokenBtn').textContent = tokenVisible ? 'Hide' : 'Show';
  });

  document.getElementById('connectBtn').addEventListener('click', () => {
    window.electronAPI.saveSettings({
      host:         document.getElementById('host').value.trim(),
      port:         parseInt(document.getElementById('port').value) || 7001,
      token:        document.getElementById('token').value.trim(),
      autoDiscover: document.getElementById('autoDiscover').checked,
    });
  });

  init();
</script>
</body>
</html>
