<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, initial-scale=1.0, user-scalable=no">
  <title>Stream Deck Pi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=8">
  <script>
    // Apply saved theme before render to avoid flash
    try {
      var _cfg = JSON.parse(localStorage.getItem('streamdeck_config') || '{}');
      if (_cfg.theme === 'dark') document.documentElement.classList.add('dark');
    } catch(e) {}
  </script>
</head>
<body>

  <!-- ── Main Stream Deck View ─────────────────────────────── -->
  <div id="app" class="view active">
    <header class="deck-header">
      <div class="deck-header-left">
        <span class="deck-page-name" id="deck-page-name">Page 1</span>
      </div>
      <div class="deck-header-center">
        <div class="deck-page-dots" id="deck-page-dots"></div>
      </div>
      <div class="deck-header-right">
        <div id="status-indicator" class="status-dot disconnected"></div>
        <div class="deck-clock-block">
          <span class="deck-clock" id="deck-clock">--:--</span>
          <span class="deck-ampm" id="deck-ampm"></span>
        </div>
      </div>
    </header>
    <main class="grid-container">
      <div class="button-grid" id="button-grid"></div>
    </main>
    <nav class="deck-nav" id="deck-nav"></nav>
  </div>

  <!-- ── Settings View ─────────────────────────────────────── -->
  <div id="settings" class="view">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" onclick="showView('app')">&#8592; Back</button>
      </div>
      <div class="topbar-center">
        <span class="view-title">Settings</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="showView('wifi')">WiFi</button>
      </div>
    </header>

    <!-- Scrollable tab area -->
    <div class="settings-tabs">
      <button class="tab-btn active" onclick="showTab('tab-connection')">Connection</button>
      <button class="tab-btn" onclick="showTab('tab-display')">Display</button>
      <button class="tab-btn" onclick="showTab('tab-system')">System</button>
    </div>

    <div class="settings-body">

      <!-- Connection tab -->
      <div id="tab-connection" class="tab-panel active">
        <div class="settings-section">
          <h2>Agent Status</h2>
          <div class="setting-row">
            <div id="agent-status-dot" class="status-dot disconnected" style="flex-shrink:0"></div>
            <span id="agent-status-label">No agent connected</span>
          </div>
          <div class="setting-row" id="agent-info-row" style="display:none">
            <span id="agent-info-text"></span>
          </div>
        </div>

        <div class="settings-section">
          <h2>Security Token</h2>
          <div class="setting-row">
            <span id="token-display" class="token-display">••••••••</span>
            <button class="icon-btn" onclick="toggleToken()" id="token-eye">&#128065;</button>
          </div>
          <div class="setting-row-btns">
            <button class="btn-secondary" onclick="copyToken()">Copy Token</button>
            <button class="btn-secondary" onclick="regenerateToken()">New Token</button>
          </div>
          <p class="settings-hint">Enter this token in the agent app on your Mac/PC.</p>
        </div>

      </div>

      <!-- Display tab -->
      <div id="tab-display" class="tab-panel">
        <div class="settings-section">
          <h2>Brightness</h2>
          <div class="setting-row">
            <span class="brightness-val" id="brightness-val">100%</span>
            <input type="range" id="brightness" min="10" max="100" value="100"
                   oninput="setBrightness(this.value)" style="flex:1" />
          </div>
        </div>
        <div class="settings-section">
          <h2>Appearance</h2>
          <div class="setting-row">
            <label>Dark Mode</label>
            <label class="toggle-switch">
              <input type="checkbox" id="dark-mode-toggle" onchange="setTheme(this.checked ? 'dark' : 'light')" />
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>
        </div>
        <div class="settings-section">
          <h2>Button Grid</h2>
          <div class="setting-row">
            <label>Layout</label>
            <select id="grid-size" onchange="setGridSize(this.value)">
              <option value="4x3">4 × 3 (12 buttons)</option>
              <option value="4x2">4 × 2 (8 buttons)</option>
              <option value="3x2">3 × 2 (6 buttons)</option>
            </select>
          </div>
        </div>
      </div>

      <!-- System tab -->
      <div id="tab-system" class="tab-panel">
        <div class="settings-section">
          <h2>Interface</h2>
          <div class="setting-row-btns">
            <button class="btn-secondary" onclick="location.reload()">Reload UI</button>
          </div>
        </div>
        <div class="settings-section">
          <h2>Configuration</h2>
          <div class="setting-row-btns">
            <button class="btn-secondary" onclick="exportConfig()">Export Config</button>
            <button class="btn-secondary" onclick="importConfig()">Import Config</button>
          </div>
        </div>
        <div class="settings-section">
          <h2>Danger Zone</h2>
          <div class="setting-row-btns">
            <button class="btn-danger" onclick="confirmReset()">Reset to Defaults</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ── WiFi View ──────────────────────────────────────────── -->
  <div id="wifi" class="view">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" onclick="showView('settings')">&#8592; Back</button>
      </div>
      <div class="topbar-center">
        <span class="view-title">WiFi</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="wifiScan()" id="wifi-scan-btn">&#8635;</button>
      </div>
    </header>
    <div class="wifi-body">
      <div id="wifi-current" class="wifi-current-section" style="display:none">
        <div class="wifi-connected-badge">
          <span class="wifi-icon">&#x1F4F6;</span>
          <div>
            <div id="wifi-current-ssid" class="wifi-ssid-name"></div>
            <div class="wifi-status-text">Connected</div>
          </div>
          <button class="btn-sm-danger" onclick="wifiDisconnect()">Disconnect</button>
        </div>
      </div>
      <div class="wifi-list" id="wifi-list">
        <div class="wifi-loading">Scanning…</div>
      </div>
    </div>
  </div>

  <!-- ── WiFi Password Dialog ───────────────────────────────── -->
  <div id="wifi-dialog" class="overlay hidden">
    <div class="confirm-box" style="min-width:300px">
      <p id="wifi-dialog-ssid" style="font-weight:700;font-size:16px;margin-bottom:12px"></p>
      <input type="password" id="wifi-password" placeholder="Password (leave blank if open)"
             style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:14px" />
      <div class="confirm-btns">
        <button class="btn-secondary" onclick="closeWifiDialog()">Cancel</button>
        <button class="btn-primary" onclick="wifiConnect()" style="width:auto;padding:9px 20px">Connect</button>
      </div>
    </div>
  </div>

  <!-- ── Button Editor View ─────────────────────────────────── -->
  <div id="editor" class="view">
    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-btn" onclick="showView('app')">&#8592; Back</button>
      </div>
      <div class="topbar-center">
        <span class="view-title">Edit Button</span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn btn-danger-text" onclick="clearButton()">Clear</button>
      </div>
    </header>
    <div class="editor-body">
      <div class="editor-preview">
        <div class="btn-preview" id="btn-preview">
          <div class="preview-chip" id="preview-chip">
            <span class="btn-preview-icon" id="preview-icon">⚡</span>
          </div>
          <span class="btn-preview-label" id="preview-label">Button</span>
        </div>
      </div>
      <div class="editor-fields">
        <div class="field-row">
          <label>Label</label>
          <input type="text" id="edit-label" placeholder="Button Label" maxlength="20"
                 oninput="updatePreview()" />
        </div>
        <div class="field-row">
          <label>Icon (emoji)</label>
          <input type="text" id="edit-icon" placeholder="🎮" maxlength="4"
                 oninput="updatePreview()" />
        </div>
        <div class="field-row">
          <label>Color</label>
          <div class="color-swatches" id="color-swatches"></div>
        </div>
        <div class="field-row">
          <label>Action</label>
          <select id="edit-action-type" onchange="updateActionFields()">
            <option value="shortcut">Keyboard Shortcut</option>
            <option value="launch">Launch App</option>
            <option value="media">Media Control</option>
            <option value="text">Type Text</option>
            <option value="url">Open URL</option>
            <option value="script">Run Script</option>
            <option value="rtsp">Camera Stream (RTSP)</option>
            <option value="rest">REST Request</option>
            <option value="unifi_access">UniFi Access (Door)</option>
          </select>
        </div>
        <div class="field-row" id="action-shortcut">
          <label>Keys</label>
          <input type="text" id="edit-shortcut" placeholder="cmd+shift+s" />
        </div>
        <div class="field-row hidden" id="action-launch">
          <label>App Path / Name</label>
          <input type="text" id="edit-launch" placeholder="/Applications/Safari.app" />
        </div>
        <div class="field-row hidden" id="action-media">
          <label>Media Command</label>
          <select id="edit-media">
            <option value="play_pause">Play / Pause</option>
            <option value="next">Next Track</option>
            <option value="prev">Previous Track</option>
            <option value="vol_up">Volume Up</option>
            <option value="vol_down">Volume Down</option>
            <option value="mute">Mute</option>
          </select>
        </div>
        <div class="field-row hidden" id="action-text">
          <label>Text to Type</label>
          <textarea id="edit-text" placeholder="Hello, World!" rows="3"></textarea>
        </div>
        <div class="field-row hidden" id="action-url">
          <label>URL</label>
          <input type="text" id="edit-url" placeholder="https://example.com" />
        </div>
        <div class="field-row hidden" id="action-script">
          <label>Script</label>
          <textarea id="edit-script" placeholder="echo hello" rows="3"></textarea>
        </div>
        <div class="field-row hidden" id="action-rtsp">
          <label>RTSP URL</label>
          <input type="text" id="edit-rtsp" placeholder="rtsp:// or rtsps://192.168.1.x:554/stream" />
        </div>
        <div class="field-row hidden" id="action-unifi">
          <label>Command</label>
          <select id="edit-unifi-cmd">
            <option value="unlock">Unlock (momentary open)</option>
            <option value="lock">Lock (⚠ may not be supported)</option>
          </select>
          <label style="margin-top:8px">Door ID</label>
          <input type="text" id="edit-unifi-door" placeholder="Run: python3 unifi_door.py list" />
        </div>
        <div class="field-row hidden" id="action-rest">
          <label>Method</label>
          <select id="edit-rest-method">
            <option value="GET">GET</option>
            <option value="POST">POST</option>
            <option value="PUT">PUT</option>
            <option value="PATCH">PATCH</option>
            <option value="DELETE">DELETE</option>
          </select>
          <label style="margin-top:8px">URL</label>
          <input type="text" id="edit-rest-url" placeholder="http://192.168.1.x/api/endpoint" />
          <label style="margin-top:8px">Body (JSON, optional)</label>
          <textarea id="edit-rest-body" placeholder='{"key": "value"}' rows="2"></textarea>
        </div>
        <button class="btn-primary" onclick="saveButton()">Save Button</button>
      </div>
    </div>
  </div>

  <!-- ── Camera view ───────────────────────────────────────── -->
  <div id="camera" class="view camera-view">
    <button class="camera-back-btn" onclick="closeCameraView()">&#8592; Back</button>
    <div class="camera-label" id="camera-label"></div>
    <img id="camera-feed" src="" alt="Camera feed" />
  </div>

  <!-- ── Toast ──────────────────────────────────────────────── -->
  <div id="toast" class="toast hidden"></div>

  <!-- ── Confirm dialog ─────────────────────────────────────── -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="confirm-box">
      <p id="confirm-msg"></p>
      <div class="confirm-btns">
        <button class="btn-secondary" onclick="closeConfirm()">Cancel</button>
        <button class="btn-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=8"></script>
  <script src="js/websocket.js?v=8"></script>
  <script src="js/ui.js?v=8"></script>
  <script src="js/wifi.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
</body>
</html>
